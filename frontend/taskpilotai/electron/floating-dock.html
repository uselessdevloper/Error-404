<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        width: 76px;
        height: 76px;
        margin: 0;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      body {
        display: grid;
        place-items: center;
      }

      .dock {
        position: relative;
        width: 68px;
        height: 68px;
        padding: 0;
        border: 0;
        border-radius: 22px;
        background: transparent;
        cursor: pointer;
        filter: drop-shadow(0 16px 28px rgba(15, 23, 42, 0.2));
        transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        -webkit-app-region: no-drag;
        overflow: visible;
        animation: float 4.2s ease-in-out infinite;
      }

      .dock:hover {
        transform: translateY(-2px) scale(1.05);
      }

      .dock:active {
        transform: scale(0.96);
      }

      .click-zone {
        position: absolute;
        inset: 0;
        -webkit-app-region: no-drag;
      }

      .pilot-core,
      .orbit,
      .shine {
        position: absolute;
        display: block;
      }

      .pilot-core {
        inset: 7px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(180, 193, 210, 0.75);
        border-radius: 20px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(246, 249, 255, 0.92)),
          #fff;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          inset 0 -10px 22px rgba(12, 102, 228, 0.08),
          0 10px 24px rgba(15, 23, 42, 0.14);
        overflow: hidden;
      }

      .pilot-core::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 16px;
        border: 1px solid rgba(12, 102, 228, 0.12);
      }

      .pilot-core::after {
        content: "";
        position: relative;
        z-index: 2;
        display: block;
        width: 36px;
        height: 36px;
        background: url('../public/logo.jpg') center/cover no-repeat;
        border-radius: 10px;
      }

      .orbit {
        inset: 2px;
        border-radius: 24px;
        border: 1.5px solid transparent;
        border-top-color: rgba(12, 102, 228, 0.85);
        border-right-color: rgba(34, 160, 107, 0.52);
        animation: orbit 7s linear infinite;
        opacity: 0.95;
      }

      .shine {
        left: 19px;
        top: 13px;
        width: 24px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0));
        transform: rotate(-24deg);
        pointer-events: none;
      }

      .arrow-mark {
        position: absolute;
        z-index: 2;
        left: 20px;
        bottom: 18px;
        width: 28px;
        height: 10px;
        color: #0c66e4;
        opacity: 0.95;
      }


      @keyframes float {
        0%,
        100% {
          filter: drop-shadow(0 16px 28px rgba(15, 23, 42, 0.2));
        }
        50% {
          filter: drop-shadow(0 20px 34px rgba(12, 102, 228, 0.22));
        }
      }

      @keyframes orbit {
        to {
          transform: rotate(360deg);
        }
      }

    </style>
  </head>
  <body>
    <button class="dock" id="dock" aria-label="TaskPilot floating agent">
      <span class="orbit"></span>
      <span class="pilot-core">
        <span class="shine"></span>
        <svg class="arrow-mark" viewBox="0 0 28 10" aria-hidden="true">
          <path d="M2 5h20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
          <path d="m18 1 5 4-5 4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="click-zone"></span>
    </button>

    <script>
      const dock = document.getElementById("dock");
      let dragging = false;
      let moved = false;
      let startMouse = { x: 0, y: 0 };
      let startWindow = { x: 0, y: 0 };

      dock.addEventListener("click", () => {
        if (moved) {
          moved = false;
          return;
        }
        window.taskPilotFloating.togglePanel();
      });

      dock.addEventListener("dblclick", () => {
        window.taskPilotFloating.restoreMain();
      });

      dock.addEventListener("mousedown", (event) => {
        dragging = true;
        moved = false;
        startMouse = { x: event.screenX, y: event.screenY };
        startWindow = { x: window.screenX, y: window.screenY };
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        const dx = event.screenX - startMouse.x;
        const dy = event.screenY - startMouse.y;
        if (Math.abs(dx) + Math.abs(dy) > 4) moved = true;
        window.taskPilotFloating.moveDock({
          x: startWindow.x + dx,
          y: startWindow.y + dy
        });
      });

      window.addEventListener("mouseup", () => {
        dragging = false;
      });
    </script>
  </body>
</html>
